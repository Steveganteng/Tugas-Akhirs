<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Restok Obat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
  <style>
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;
         background:linear-gradient(135deg,#1b5e20,#2e7d32 60%,#43a047);margin:0}
    .login-card{background:#fff;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.25);
         width:100%;max-width:380px;padding:34px 30px}
    .login-brand{display:flex;align-items:center;gap:10px;justify-content:center;
         font-size:1.35rem;font-weight:700;color:#1b5e20;margin-bottom:6px}
    .login-sub{text-align:center;color:#6b7280;font-size:.9rem;margin-bottom:22px}
    .login-card label{font-weight:600;font-size:.85rem;color:#374151}
    .btn-login{background:#2e7d32;color:#fff;width:100%;padding:10px;font-weight:600}
    .btn-login:hover{background:#1b5e20;color:#fff}
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand"><i class="bi bi-capsule"></i> Restok Obat</div>
    <div class="login-sub">Sistem Forecasting & Rekomendasi Restok Obat</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ 'danger' if cat=='danger' else cat }} py-2">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="mb-3">
        <label>Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" required autofocus
                 placeholder="masukkan username">
        </div>
      </div>
      <div class="mb-4">
        <label>Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" required
                 placeholder="masukkan password">
        </div>
      </div>
      <button type="submit" class="btn btn-login"><i class="bi bi-box-arrow-in-right"></i> Masuk</button>
    </form>
  </div>
</body>
</html>
